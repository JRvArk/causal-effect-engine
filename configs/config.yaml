datasets:
  lalonde:
    path: data/raw/lalonde.csv
    treatment: treat
    outcome: re78
    covariates: [age, education, black, hispanic, married, nodegree, re74, re75]
    experimental_ate: 1794.0
  ihdp:
    path: data/raw/ihdp.csv
    treatment: treatment
    outcome: y_factual
    mu0_col: mu0
    mu1_col: mu1
    covariates: [x1, x2, x3, x4, x5, x6, x7, x8, x9, x10,
                 x11, x12, x13, x14, x15, x16, x17, x18, x19, x20,
                 x21, x22, x23, x24, x25]
  criteo:
    path: data/raw/criteo_uplift.csv
    treatment: treatment
    outcome: conversion
    covariates: [f0, f1, f2, f3, f4, f5, f6, f7, f8, f9, f10, f11]

duckdb:
  path: data/db/causal.duckdb

estimators:
  default: dml
  nuisance_model: lightgbm
  cv_folds: 5

evaluation:
  n_refutation_simulations: 100
  subset_fraction: 0.8
  n_subsets: 10

api:
  host: 0.0.0.0
  port: 8000
